<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vajikarana Ayurvedic Shop</title>
    <style>
        :root { --primary: #2d5a27; --gold: #d4af37; --bg: #f8faf8; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #fff; padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-8px); border: 1px solid var(--gold); }
        .card img { width: 130px; height: auto; margin-bottom: 15px; }
        
        /* The Popup Layout */
        #productDetail { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .pop-animation { animation: littleToBig 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards; }
        @keyframes littleToBig { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .img-stack { display: flex; flex-direction: column; gap: 25px; align-items: center; max-width: 600px; margin: 0 auto; }
        .main-img { width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .section-label { color: var(--gold); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; font-size: 0.9rem; }
        
        .buy-bar { text-align: center; margin-top: 40px; padding-bottom: 60px; }
        .buy-btn { background: var(--primary); color: #fff; border: none; padding: 20px; border-radius: 50px; width: 100%; max-width: 450px; font-size: 1.3rem; font-weight: bold; cursor: pointer; }
        .close { position: fixed; top: 20px; right: 20px; font-size: 35px; cursor: pointer; color: var(--primary); background: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1 style="text-align:center; color: var(--primary);">Vajikarana Elite Collection</h1>
    <div class="grid" id="mainGrid"></div>

    <div id="productDetail">
        <div class="close" onclick="closeBox()">✕</div>
        <div id="detailBox" class="pop-animation"></div>
    </div>

<script>
    const products = [
        { name: "Vajri-Force 9X", tags: "Stamina", herbs: "Ashwagandha, Gokshura, Safed Musli, Kaunch Beej, Akarkara, Vidari Kand, Salam Panja" },
        { name: "Ojas Aura Gold", tags: "Luxury Vigor", herbs: "Swarna Bhasma, Shilajit, Kesar, Mukta Pishti, White Musli, Brahmi, Shatavari" },
        { name: "Kamadeva Flux", tags: "Blood Flow", herbs: "Jaiphal, Javitri, Lavang, Malkangni, Dalchini, Akarkara, Garlic Extract" },
        { name: "Saptadhatri Vital", tags: "Body Strength", herbs: "Vidari, Shatavari, Giloy, Ashoka, Gokhru, Bala, Anantmool" },
        { name: "Rati-Rani Essence", tags: "Female Libido", herbs: "Ashoka, Lodhra, Aloe Vera, Manjistha, Shatavari, Mulethi, Punarnava" },
        { name: "Stambhan 100", tags: "Endurance", herbs: "Salam Panja, Talmakhana, Beejband, Khareti, Gond Katira, Semal Musli, Kamarkas" },
        { name: "Urja-Max Resin", tags: "Pure Energy", herbs: "Raw Shilajit, Gold Dust, Fulvic Acid, Humic Acid, Ashwagandha, Triphala, Guggul" },
        { name: "Veerya-Pushti Plus", tags: "Vital Quality", herbs: "Semal Musli, Varahikand, Gokhru, Shatavari, Ashwagandha, Atibala, Vidari" },
        { name: "Nagarjuna Nerve Oil", tags: "Sensitivity", herbs: "Bala, Jyotishmati, Malkangni, Jaiphal, Sesame Oil, Ashwagandha, Shatavari" },
        { name: "Ananda Bliss Caps", tags: "Stress Relief", herbs: "Brahmi, Shankhpushpi, Jatamansi, Vacha, Tagar, Sarpgandha, Ashwagandha" },
        { name: "Agni-Veda Fire", tags: "Metabolism", herbs: "Pipali, Maricha, Ginger, Cinnamon, Cardamom, Ajwain, Chitrakmool" },
        { name: "Kasturi-Balam", tags: "Muscle Vigor", herbs: "Lata Kasturi, Ashwagandha, Atibala, Musli, Gokhru, Vidari, Salam Mishri" },
        { name: "Yuvana Eternal", tags: "Anti-Aging", herbs: "Amla, Guduchi, Tulsi, Neem, Turmeric, Moringa, Wheatgrass" },
        { name: "Tantra-Flow 360", tags: "Circulation", herbs: "Arjun Bark, Punarnava, Cinnamon, Guggul, Garlic, Gokhru, Pushkarmool" },
        { name: "Shakti-Sutra 10", tags: "Triple Musli", herbs: "White Musli, Black Musli, Kali Musli, Ashwagandha, Shilajit, Kaunch Beej, Gokhru" },
        { name: "Prana-Vigor Mint", tags: "Mood Boost", herbs: "Cardamom, Peppermint, Green Tea, Mulethi, Tulsi, Fennel, Shilajit" },
        { name: "Dhatu-Genic", tags: "Physical Mass", herbs: "Kharonti, Vidhara, Cowhage, Ashwagandha, Shatavari, Musli, Methi Seed" },
        { name: "Soma-Nectar Drops", tags: "Libido Boost", herbs: "Saffron, Rose, Raw Honey, Sandalwood, Kewra, Ashwagandha, Brahmi" },
        { name: "Vayu-Shanti Calm", tags: "Anxiety Control", herbs: "Vacha, Sarpgandha, Tagar, Shankhpushpi, Brahmi, Jatamansi, Ashwagandha" },
        { name: "Maha-Vajra Tablet", tags: "Iron Foundation", herbs: "Abhraka Bhasma, Bang Bhasma, Loh Bhasma, Yashad Bhasma, Shilajit, Musli, Gokhru" }
    ];

    const grid = document.getElementById('mainGrid');
    products.forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openMe(i);
        card.innerHTML = `<img src="bottle${i+1}.jpg" onerror="this.src='https://via.placeholder.com/150x200/2d5a27/fff?text=Bottle'"><p><strong>${p.name}</strong></p><p style="color:#666">${p.tags}</p>`;
        grid.appendChild(card);
    });

    function openMe(i) {
        const p = products[i];
        const box = document.getElementById('detailBox');
        box.innerHTML = `
            <div class="img-stack">
                <div><div class="section-label">1. Product Label</div>
                <img src="bottle${i+1}.jpg" class="main-img" onerror="this.src='https://via.placeholder.com/400x500/2d5a27/fff?text=${p.name}+Bottle'"></div>
                
                <div><div class="section-label">2. Complex Function</div>
                <div style="background:#f0f4f0; padding:20px; border-radius:10px; border-left:5px solid var(--primary);">
                    <p><strong>Main Benefit:</strong> ${p.tags}</p>
                    <p><strong>The 7-Herb Matrix:</strong><br>${p.herbs}</p>
                </div></div>
                
                <div><div class="section-label">3. Ayurvedic Origins</div>
                <img src="herb${i+1}.jpg" class="main-img" onerror="this.src='https://via.placeholder.com/400x300/a3b18a/fff?text=Ayurvedic+Herbs+Image'"></div>
            </div>
            <div class="buy-bar">
                <h2>${p.name}</h2>
                <button class="buy-btn">ADD TO CART / BUY NOW</button>
            </div>
        `;
        document.getElementById('productDetail').style.display = 'block';
    }

    function closeBox() { document.getElementById('productDetail').style.display = 'none'; }
</script>

</body>
</html>
