<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Ayurveda | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-green: #0a1a0f;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(212, 175, 55, 0.3);
        }

        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #050a06; color: white; scroll-behavior: smooth; }

        /* Floating Transparent Header */
        .header-panel {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1000px; height: 60px;
            background: rgba(10, 26, 15, 0.7); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 100px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 25px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-small { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
        .logo-small span { color: var(--gold); }
        
        .nav-items { display: flex; gap: 15px; }
        .nav-items a { 
            color: white; text-decoration: none; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 1px; font-weight: 400;
            transition: 0.3s; padding: 8px 12px; border-radius: 20px;
        }
        .nav-items a:hover { background: var(--glass); color: var(--gold); }
        .nav-items a.active { border: 1px solid var(--gold); color: var(--gold); }

        /* Hero Section */
        .hero {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(10, 26, 15, 0.85), rgba(5, 10, 6, 1)), 
                        url('https://images.unsplash.com/photo-1540324155974-7523202daa3f?q=80&w=1915&auto=format&fit=crop'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .hero h1 { 
            font-family: 'Playfair Display', serif; font-size: clamp(38px, 12vw, 80px); 
            margin: 0; line-height: 1; font-style: italic; color: white;
        }
        .hero p { 
            font-size: 14px; max-width: 300px; margin: 25px 0; 
            opacity: 0.7; line-height: 1.6; letter-spacing: 0.5px;
        }

        .main-cta {
            background: var(--gold); color: #000; padding: 18px 50px; 
            text-decoration: none; font-weight: 700; border-radius: 2px; 
            letter-spacing: 2px; font-size: 11px; transition: 0.3s;
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.2);
        }
        .main-cta:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(212, 175, 55, 0.3); }

        /* All-In-One Quick Links */
        .quick-access {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: center; gap: 40px; opacity: 0.6;
        }
        .q-link { text-decoration: none; color: white; font-size: 10px; letter-spacing: 1px; display: flex; flex-direction: column; align-items: center; }

        /* Content Section */
        .section-tag { color: var(--gold); text-transform: uppercase; letter-spacing: 4px; font-size: 10px; margin-bottom: 20px; display: block; text-align: center;}

    </style>
</head>
<body>

    <header class="header-panel">
        <div class="logo-small">PURE <span>AYURVEDA</span></div>
        <nav class="nav-items">
            <a href="shop.html" class="active">Shop</a>
            <a href="#">Track Order</a>
            <a href="#">About</a>
            <a href="#">Support</a>
        </nav>
    </header>

    <section class="hero">
        <span class="section-tag">Premium Male Wellness</span>
        <h1>Pure Wisdom.<br>Dark Potency.</h1>
        <p>Harnessing ancient forest roots to deliver modern physical excellence. 100% Organic certified.</p>
        <a href="shop.html" class="main-cta">START YOUR JOURNEY</a>

        <div class="quick-access">
            <a href="#about" class="q-link">SCROLL TO DISCOVER</a>
        </div>
    </section>

</body>
</html>
